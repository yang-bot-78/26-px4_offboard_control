/fastlio_odometry_guard:
  ros__parameters:
    input_topic: /Odometry
    max_computed_speed_mps: 3.0
    max_computed_z_speed_mps: 1.5
    max_dt_s: 1.0
    max_position_jump_m: 0.6
    max_quaternion_norm: 1.5
    max_reported_speed_mps: 4.0
    max_reported_z_speed_mps: 2.0
    max_xy_jump_m: 0.45
    max_z_jump_m: 0.25
    min_dt_s: 0.001
    min_quaternion_norm: 0.5
    output_topic: /Odometry/guarded
    qos_overrides:
      /parameter_events:
        publisher:
          depth: 1000
          durability: volatile
          history: keep_last
          reliability: reliable
    reject_log_period_s: 1.0
    use_sim_time: false

